name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libcurl
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build
        run: gcc -O2 -Wall -Wextra -o laping-linux-x86_64 laping.c updater.c -lcurl
      - uses: actions/upload-artifact@v4
        with:
          name: laping-linux-x86_64
          path: laping-linux-x86_64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 zip
      - name: Download prebuilt libcurl (mingw, win64)
        run: |
          curl -sL "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" -o curl-mingw.zip
          unzip -q curl-mingw.zip
          mv curl-*-win64-mingw curl-mingw
      - name: Build
        run: |
          x86_64-w64-mingw32-gcc -O2 -Wall -Wextra \
            -I curl-mingw/include \
            -o laping.exe laping.c updater.c \
            -L curl-mingw/lib -lcurl.dll -lws2_32 -lwldap32 -lcrypt32
          cp curl-mingw/bin/libcurl-x64.dll .
          cp laping.exe laping-windows-x86_64.exe
          zip laping-windows-x86_64.zip laping.exe libcurl-x64.dll
      - uses: actions/upload-artifact@v4
        with:
          name: laping-windows-x86_64
          path: |
            laping-windows-x86_64.zip
            laping-windows-x86_64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/laping-linux-x86_64
            dist/laping-windows-x86_64.zip
            dist/laping-windows-x86_64.exe
          generate_release_notes: true
